name: Backfill Alerts

on:
  workflow_dispatch:
    inputs:
      from_date:
        description: 'Start date to backfill from (YYYY-MM-DD)'
        required: true
        default: '2026-02-27'

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install telethon

      - name: Run backfill
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
          BACKFILL_FROM: ${{ inputs.from_date }}
        run: python scripts/backfill.py

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull --rebase origin main
          git add docs/data.json
          git diff --staged --quiet || git commit -m "data: backfill alerts from ${{ inputs.from_date }} [skip ci]"
          git push
